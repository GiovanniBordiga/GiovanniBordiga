name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&theme=gotham
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=gotham
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for bertoldi-collab/DifFlexMM
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bertoldi-collab&repo=DifFlexMM
          path: profile/pin-bertoldi-collab-DifFlexMM.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for bertoldi-collab/morphing-lattices
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bertoldi-collab&repo=morphing-lattices
          path: profile/pin-bertoldi-collab-morphing-lattices.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for bertoldi-collab/textile-hinge-metamaterials
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bertoldi-collab&repo=textile-hinge-metamaterials
          path: profile/pin-bertoldi-collab-textile-hinge-metamaterials.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for bertoldi-collab/tracking-markers
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bertoldi-collab&repo=tracking-markers
          path: profile/pin-bertoldi-collab-tracking-markers.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for bertoldi-collab/jax-intro
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=bertoldi-collab&repo=jax-intro
          path: profile/pin-bertoldi-collab-jax-intro.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for GiovanniBordiga/ProbabilisticBricks
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=GiovanniBordiga&repo=ProbabilisticBricks
          path: profile/pin-GiovanniBordiga-ProbabilisticBricks.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for GiovanniBordiga/TOP-OPT-Plates
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=GiovanniBordiga&repo=TOP-OPT-Plates
          path: profile/pin-GiovanniBordiga-TOP-OPT-Plates.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card for GiovanniBordiga/latex-subfigs-combiner
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=GiovanniBordiga&repo=latex-subfigs-combiner
          path: profile/pin-GiovanniBordiga-latex-subfigs-combiner.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
