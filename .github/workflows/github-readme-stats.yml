name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&theme=gotham
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=gotham
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: stats-cards
          path: profile/*.svg

  generate-pin-cards:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - username: bertoldi-collab
            repo: DifFlexMM
          - username: bertoldi-collab
            repo: MechanicalMetamaterialCloaks
          - username: bertoldi-collab
            repo: morphing-lattices
          - username: bertoldi-collab
            repo: textile-hinge-metamaterials
          - username: bertoldi-collab
            repo: tracking-markers
          - username: bertoldi-collab
            repo: jax-intro
          - username: GiovanniBordiga
            repo: ProbabilisticBricks
          - username: GiovanniBordiga
            repo: TOP-OPT-Plates
          - username: GiovanniBordiga
            repo: latex-subfigs-combiner

    steps:
      - uses: actions/checkout@v6

      - name: Generate pin card for ${{ matrix.username }}/${{ matrix.repo }}
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ matrix.username }}&repo=${{ matrix.repo }}&show_owner=true&description_lines_count=2&theme=gotham
          path: profile/pin-${{ matrix.username }}-${{ matrix.repo }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: pin-${{ matrix.username }}-${{ matrix.repo }}
          path: profile/pin-${{ matrix.username }}-${{ matrix.repo }}.svg

  commit:
    needs: [generate-stats, generate-pin-cards]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          path: profile/
          merge-multiple: true

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
